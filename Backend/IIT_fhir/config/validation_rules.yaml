# ──────────────────────────────────────────────────────────────
# NHCX FHIR Validation Rules Configuration
#
# This file contains all validation rules and constants for FHIR
# Bundle validation against NRCeS IG v6.5.0 requirements.
# ──────────────────────────────────────────────────────────────

# NHCX Profile URLs (NRCeS IG v6.5.0)
profiles:
  insurance_plan: https://nrces.in/ndhm/fhir/r4/StructureDefinition/InsurancePlan
  organization: https://nrces.in/ndhm/fhir/r4/StructureDefinition/Organization
  insurance_plan_bundle: https://nrces.in/ndhm/fhir/r4/StructureDefinition/InsurancePlanBundle

# CodeSystem URLs
codesystems:
  snomed: http://snomed.info/sct
  insuranceplan_type: https://nrces.in/ndhm/fhir/r4/CodeSystem/ndhm-insuranceplan-type
  plan_type: https://nrces.in/ndhm/fhir/r4/CodeSystem/ndhm-plan-type
  claim_exclusion: https://nrces.in/ndhm/fhir/r4/CodeSystem/ndhm-claim-exclusion

# Extension URLs
extensions:
  claim_exclusion: https://nrces.in/ndhm/fhir/r4/StructureDefinition/Claim-Exclusion
  claim_condition: https://nrces.in/ndhm/fhir/r4/StructureDefinition/Claim-Condition

# Bundle-level validation rules
bundle:
  required_type: collection
  allowed_types:
    - collection
    - transaction
    - document
  required_fields:
    - id
    - type
    - meta
    - entry
  required_entries:
    - Organization
    - InsurancePlan

# Organization validation rules
organization:
  required_fields:
    - name
    - identifier
  profile_required: true

# InsurancePlan validation rules
insuranceplan:
  required_fields:
    - identifier
    - status
    - name
    - period
    - type
    - ownedBy
  allowed_statuses:
    - active
    - draft
    - retired
  profile_required: true
  coverage_fields:
    - benefit
  coverage_period_key: period

# Scoring Configuration
scoring:
  error_penalty: 5
  warning_penalty: 1

# Remediation Messages Configuration
remediation:
  bundle:
    id_missing: "Add a UUID to the 'id' field (e.g., '9297ca93-6746-4d2b-af8a-e2b78bde98b4')"
    resourcetype_invalid: "Set resourceType to 'Bundle' at the root level"
    type_invalid: "Set type to one of: 'collection', 'transaction', or 'document'"
    profile_missing: "Add InsurancePlanBundle profile to Bundle.meta.profile"
    entries_missing: "Add at least one entry to the Bundle"
    organization_missing: "Add an Organization resource to the Bundle"
    insuranceplan_missing: "Add an InsurancePlan resource to the Bundle"
    fullurl_missing: "Add fullUrl field to bundle entry"
  
  organization:
    profile_missing: "Add Organization profile to meta.profile"
    name_missing: "Add the organization name (e.g., 'Bajaj Allianz Insurance')"
    identifier_missing: "Add IRDAI registration identifier to Organization.identifier array"
  
  insuranceplan:
    profile_missing: "Add InsurancePlan profile to meta.profile"
    identifier_missing: "Add UIN to InsurancePlan.identifier array"
    status_invalid: "Set status to: 'active', 'draft', or 'retired'"
    name_missing: "Add the insurance plan name (e.g., 'Global Health Care')"
    period_start_missing: "Add policy start date in YYYY-MM-DD format"
    type_missing: "Add insurance plan type with SNOMED coding"
    type_codesystem_wrong: "Use the correct CodeSystem for insurance plan type"
    ownedby_missing: "Add reference to Organization that owns this plan"
    coverage_missing: "Add at least one coverage section"
